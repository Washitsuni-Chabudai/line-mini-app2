<!DOCTYPE html>
<html lang="ja">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>LINE 会員証</title>
    <style>
      body { font-family: sans-serif; display: flex; justify-content: center; align-items: center; height: 100vh; background-color: #f3f4f6; margin: 0; }
      .card { background: white; width: 300px; border-radius: 16px; box-shadow: 0 4px 15px rgba(0,0,0,0.1); padding: 24px; text-align: center; }
      .avatar { width: 80px; height: 80px; border-radius: 50%; border: 3px solid #06c755; margin-bottom: 12px; object-fit: cover; }
      .name { font-size: 1.25rem; font-weight: bold; color: #333; margin-bottom: 4px; }
      .rank { color: #06c755; font-size: 0.85rem; font-weight: bold; letter-spacing: 1px; margin-bottom: 24px; }
      .barcode { background: #111; color: white; padding: 16px; font-family: monospace; letter-spacing: 6px; font-size: 1.1rem; border-radius: 6px; }
    </style>
  </head>
  <body>
    <div id="app">
      <div class="card">
        <!-- LINEのアイコン画像が入る場所 -->
        <img id="pictureUrl" class="avatar" src="https://placehold.co/80" alt="ユーザー画像" />
        <!-- LINEの名前が入る場所 -->
        <div id="displayName" class="name">読み込み中...</div>
        <div class="rank">PREMIUM MEMBER</div>
        <!-- 簡易的なバーコード表示（裏で会員番号と連動させるイメージです） -->
        <div class="barcode">||||| | || ||||</div>
        <small style="color: #999; display: block; margin-top: 12px;">No. 2026-0719</small>
      </div>
    </div>
    <script type="module" src="/src/main.ts"></script>
  </body>
</html>
