<!DOCTYPE html>
<html lang="ja">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no" />
    <title>デジタルハイウェイパス</title>
    <link rel="stylesheet" href="/style.css" />
  </head>
  <body>
    <div id="app">
      <!-- 💳 会員証本体 -->
      <div class="membership-card">
        <!-- ヘッダーエリア -->
        <div class="card-header">
          <div class="brand-title">
            <span class="logo-mark">🛣️</span> DIGITAL HIGHWAY PASS
          </div>
          <span class="status-badge">認証済み</span>
        </div>

        <!-- プロフィールエリア -->
        <div class="profile-area">
          <img 
            id="pictureUrl" 
            src="https://via.placeholder.com/80" 
            alt="プロフィール画像" 
            class="profile-img" 
          />
          <div class="profile-info">
            <p class="greeting">マイアカウント</p>
            <h2 id="displayName">読み込み中...</h2>
          </div>
        </div>

        <!-- バーコードエリア -->
        <div class="barcode-area">
          <p class="barcode-hint">スキャナーにかざしてください</p>
          <img src="https://barcode.tec-it.com/barcode.ashx?data=HANSHIN123456789&code=Code128&translate-esc=on" alt="会員バーコード" class="barcode-img"/>
        </div>

        <!-- 車両・ETC情報 -->
        <div class="info-grid">
          <div class="info-item">
            <span class="info-label">連携ETCカード</span>
            <span class="info-value">****-****-****-5678</span>
          </div>
          <div class="info-item">
            <span class="info-label">登録車両</span>
            <span class="info-value">阪神 300 あ 12-34</span>
          </div>
          <div class="info-item">
            <span class="info-label">割引ステータス</span>
            <span class="info-value highlight">適用中 (マイレージ)</span>
          </div>
        </div>
      </div>
    </div>
    <script type="module" src="/src/main.ts"></script>
  </body>
</html>
